version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: zalo-crm-app
    restart: unless-stopped
    ports:
      - "3080:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-crmuser}:${DB_PASSWORD}@db:5432/${DB_NAME:-zalocrm}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-http://localhost:9000}
      - S3_BUCKET=${S3_BUCKET:-zalocrm-attachments}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      # Phase 7 overnight test: STUB mode prevents Zalo SDK calls.
      # Set to 'false' or remove for REAL mode.
      - AUTOMATION_STUB_MODE=${AUTOMATION_STUB_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/zalo-crm/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # Healthcheck dùng node (image node:20-alpine không có curl). /health trả 503
    # khi DB down → container unhealthy → Docker restart. start_period rộng vì
    # startup chạy `prisma db push` + reconnect Zalo accounts.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Cho graceful shutdown (SIGTERM) đủ thời gian drain trước khi SIGKILL.
    # Phải >= SHUTDOWN_TIMEOUT_MS (mặc định 20s trong app.ts).
    stop_grace_period: 30s

  db:
    image: postgres:16-alpine
    container_name: zalo-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-zalocrm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crmuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c max_connections=50

  redis:
    image: redis:7-alpine
    container_name: zalo-crm-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - redis

  minio:
    image: minio/minio:latest
    container_name: zalo-crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # SECURITY: no defaults — deploy MUST set MINIO_ROOT_USER and
      # MINIO_ROOT_PASSWORD in .env. Previously fell back to minioadmin/
      # minioadmin which let anyone with network access pop the admin console.
      MINIO_ROOT_USER:     "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}"
    volumes:
      - minio_data:/data
    ports:
      # Port 9000 (S3 API) MUST stay reachable from Zalo CDN — Zalo's servers
      # fetch attachment URLs we send via zca-js sendImage/sendVideo, so we
      # can't bind to loopback. In production this MUST sit behind a TLS
      # reverse proxy (nginx/Caddy) on the host that:
      #   - serves /<bucket>/<key> with HTTPS
      #   - rate-limits per IP
      #   - keeps the admin console (:9001) firewalled to ops VPN only.
      # The :9001 admin console IS bound to 127.0.0.1 below — never expose it.
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: zalo-crm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${S3_BUCKET:-zalocrm-attachments};
      mc anonymous set download local/${S3_BUCKET:-zalocrm-attachments};
      exit 0;
      "
    # Anonymous DOWNLOAD on the bucket is intentional: Zalo's CDN fetches
    # attachment URLs we hand to zca-js. Keys are random UUIDs (see
    # backend/src/shared/storage/minio-client.ts: `${date}/${randomUUID()}${ext}`)
    # so listing is disabled and enumeration is infeasible.
    # Anonymous UPLOAD is NOT enabled — only the backend can write via
    # access-key auth.
    environment:
      # Same hard-fail pattern as minio service — no default credentials.
      MINIO_ROOT_USER:     "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}"
      S3_BUCKET: ${S3_BUCKET:-zalocrm-attachments}

  backup:
    image: prodrigestivill/postgres-backup-local
    container_name: zalo-crm-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME:-zalocrm}
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    depends_on:
      - db

  # Backup OFFSITE — đẩy PG dumps (từ service `backup`) + bucket MinIO lên 1
  # bucket S3-compatible ở nhà cung cấp khác (R2/S3/B2). Chống mất dữ liệu khi
  # hỏng ổ đĩa/máy chủ. BẬT bằng: docker compose --profile offsite up -d
  # Yêu cầu khai báo OFFSITE_S3_* trong .env.
  backup-offsite:
    image: minio/mc:latest
    container_name: zalo-crm-backup-offsite
    restart: unless-stopped
    profiles:
      - offsite
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./backups:/backups:ro
    environment:
      OFFSITE_S3_ENDPOINT: "${OFFSITE_S3_ENDPOINT:?OFFSITE_S3_ENDPOINT must be set in .env}"
      OFFSITE_S3_BUCKET: ${OFFSITE_S3_BUCKET:-zalocrm-backups}
      OFFSITE_S3_ACCESS_KEY: "${OFFSITE_S3_ACCESS_KEY:?OFFSITE_S3_ACCESS_KEY must be set}"
      OFFSITE_S3_SECRET_KEY: "${OFFSITE_S3_SECRET_KEY:?OFFSITE_S3_SECRET_KEY must be set}"
      OFFSITE_BACKUP_KEEP_DAYS: ${OFFSITE_BACKUP_KEEP_DAYS:-30}
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}"
      S3_BUCKET: ${S3_BUCKET:-zalocrm-attachments}
    # Vòng lặp: mirror mỗi 24h. `$$` để biến được shell trong container đọc
    # (không bị docker-compose nội suy lúc parse).
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[backup-offsite] khởi động — mirror mỗi 24h";
        while true; do
          mc alias set zsrc "http://minio:9000" "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null;
          mc alias set zdst "$$OFFSITE_S3_ENDPOINT" "$$OFFSITE_S3_ACCESS_KEY" "$$OFFSITE_S3_SECRET_KEY" >/dev/null;
          mc mb --ignore-existing "zdst/$$OFFSITE_S3_BUCKET" >/dev/null 2>&1 || true;
          echo "[backup-offsite] $$(date -u +%FT%TZ) mirror PG dumps → offsite";
          mc mirror --overwrite /backups "zdst/$$OFFSITE_S3_BUCKET/postgres" || echo "  ⚠ mirror PG dumps lỗi";
          mc rm --recursive --force --older-than "$${OFFSITE_BACKUP_KEEP_DAYS}d" "zdst/$$OFFSITE_S3_BUCKET/postgres/" 2>/dev/null || true;
          echo "[backup-offsite] $$(date -u +%FT%TZ) mirror MinIO bucket → offsite";
          mc mirror --overwrite "zsrc/$$S3_BUCKET" "zdst/$$OFFSITE_S3_BUCKET/minio/$$S3_BUCKET" || echo "  ⚠ mirror MinIO lỗi";
          echo "[backup-offsite] xong, ngủ 24h";
          sleep 86400;
        done

volumes:
  pg_data:
  file_storage:
  redis_data:
  minio_data:
